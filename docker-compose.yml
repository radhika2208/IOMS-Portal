version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: ioms_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ioms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ioms_password}
      POSTGRES_DB: ${POSTGRES_DB:-ioms_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ioms_user} -d $${POSTGRES_DB:-ioms_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ioms_backend_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ioms_user}:${POSTGRES_PASSWORD:-ioms_password}@db:5432/${POSTGRES_DB:-ioms_db}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      PORT: 8000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ioms_frontend_web
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: ioms_postgres_data
